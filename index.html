<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImageLock Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #00e5ff;
    --accent2: #ff3d6e;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --locked: #ff3d6e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    z-index: 100;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,.4);
  }
  header span {
    font-size: .65rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── UPLOAD SCREEN ── */
  #upload-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 40px;
  }
  .drop-zone {
    width: min(480px, 90vw);
    aspect-ratio: 16/10;
    border: 2px dashed var(--border);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    transition: border-color .25s, background .25s;
    position: relative;
    overflow: hidden;
    background: var(--surface);
  }
  .drop-zone:hover { border-color: var(--accent); background: rgba(0,229,255,.04); }
  .drop-zone svg { width: 52px; height: 52px; opacity: .4; }
  .drop-zone p { font-size: .8rem; color: var(--muted); text-align: center; line-height: 1.8; }
  .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  .btn {
    font-family: 'Space Mono', monospace;
    font-size: .75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 28px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    transition: background .2s, color .2s, box-shadow .2s;
    border-radius: 3px;
  }
  .btn:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 20px rgba(0,229,255,.35);
  }
  .btn.danger {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .btn.danger:hover {
    background: var(--accent2);
    color: #fff;
    box-shadow: 0 0 20px rgba(255,61,110,.35);
  }
  .btn:disabled { opacity: .3; pointer-events: none; }

  /* ── VIEWER SCREEN ── */
  #viewer-screen {
    display: none;
    flex: 1;
    flex-direction: column;
    width: 100%;
    overflow: hidden;
  }
  #viewer-screen.active { display: flex; }

  /* canvas area */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #050508;
    cursor: grab;
  }
  #canvas-wrap.grabbing { cursor: grabbing; }
  #canvas-wrap.locked-cursor { cursor: not-allowed; }

  #img-el {
    position: absolute;
    top: 50%; left: 50%;
    transform-origin: center center;
    transform: translate(-50%, -50%) scale(1);
    user-select: none;
    -webkit-user-drag: none;
    max-width: none;
    transition: none;
    image-rendering: auto;
  }

  /* ── BOTTOM TOOLBAR ── */
  #toolbar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 50;
  }

  #toolbar .sep {
    width: 1px;
    height: 28px;
    background: var(--border);
  }

  /* zoom pill */
  .zoom-display {
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: 1px;
    min-width: 58px;
    text-align: center;
  }
  .zoom-display span { color: var(--accent); font-weight: 700; }

  /* distance indicators */
  .dist-box {
    background: rgba(0,0,0,.4);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 12px;
    font-size: .65rem;
    letter-spacing: 1px;
    text-align: center;
    min-width: 100px;
  }
  .dist-box .label { color: var(--muted); margin-bottom: 2px; }
  .dist-box .val { color: var(--accent); font-weight: 700; font-size: .8rem; }
  .dist-box.lock-val .val { color: var(--locked); }

  /* lock status badge */
  #lock-badge {
    font-size: .65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 3px;
    background: rgba(0,229,255,.08);
    border: 1px solid var(--accent);
    color: var(--accent);
    transition: all .2s;
  }
  #lock-badge.is-locked {
    background: rgba(255,61,110,.15);
    border-color: var(--locked);
    color: var(--locked);
    animation: pulse-badge .8s ease-in-out infinite alternate;
  }
  @keyframes pulse-badge {
    from { box-shadow: 0 0 0 rgba(255,61,110,0); }
    to   { box-shadow: 0 0 12px rgba(255,61,110,.5); }
  }

  /* ── MODAL / INFO OVERLAY ── */
  #zoom-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  #zoom-modal.open { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 36px 40px;
    width: min(420px, 90vw);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .modal-box h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 3px;
    color: var(--accent);
  }
  .modal-box p { font-size: .75rem; color: var(--muted); line-height: 1.8; }

  .range-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .range-row label {
    font-size: .65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
  .range-row label span { color: var(--text); }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    accent-color: var(--accent);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px rgba(0,229,255,.5);
  }
  .range-row.lock-range input[type=range] { accent-color: var(--locked); }
  .range-row.lock-range input[type=range]::-webkit-slider-thumb { background: var(--locked); box-shadow: 0 0 8px rgba(255,61,110,.5); }

  .modal-actions { display: flex; gap: 12px; }

  /* ── CROSSHAIR (locked indicator) ── */
  #crosshair {
    display: none;
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 60;
  }
  #crosshair.show { display: block; }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,61,110,.25);
  }
  #crosshair::before { left: 50%; top: 0; width: 1px; height: 100%; transform: translateX(-50%); }
  #crosshair::after  { top: 50%; left: 0; height: 1px; width: 100%; transform: translateY(-50%); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 22px;
    border-radius: 4px;
    font-size: .7rem;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity .3s, transform .3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 300;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── NOISE OVERLAY ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: .025;
    pointer-events: none;
    z-index: 9999;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <h1>ImageLock</h1>
    <span>Zoom · Lock · Control</span>
  </div>
</header>

<!-- UPLOAD SCREEN -->
<div id="upload-screen">
  <div class="drop-zone" id="drop-zone">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="M21 15l-5-5L5 21"/>
    </svg>
    <p>Arraste uma foto aqui<br>ou clique para selecionar</p>
    <input type="file" id="file-input" accept="image/*">
  </div>
  <button class="btn" id="upload-btn">
    ↑ Enviar Foto
  </button>
</div>

<!-- VIEWER SCREEN -->
<div id="viewer-screen">
  <div id="canvas-wrap" id="canvas-wrap">
    <img id="img-el" src="" alt="Imagem carregada" draggable="false">
  </div>

  <div id="toolbar">
    <!-- zoom info -->
    <div class="dist-box">
      <div class="label">Distância mín.</div>
      <div class="val" id="min-display">—</div>
    </div>
    <div class="dist-box lock-val">
      <div class="label">Distância máx.</div>
      <div class="val" id="max-display">—</div>
    </div>

    <div class="sep"></div>

    <div class="zoom-display">Zoom<br><span id="zoom-label">1.0×</span></div>

    <div class="sep"></div>

    <!-- buttons -->
    <button class="btn" id="open-zoom-modal-btn">⊕ Zoom</button>
    <button class="btn danger" id="lock-btn">⊘ Travar</button>
    <button class="btn" id="unlock-btn" style="display:none">↺ Destravar</button>
    <button class="btn" id="change-img-btn" style="opacity:.6;font-size:.65rem">Trocar Foto</button>

    <div class="sep"></div>

    <div id="lock-badge">LIVRE</div>
  </div>
</div>

<!-- ZOOM MODAL -->
<div id="zoom-modal">
  <div class="modal-box">
    <h2>⊕ Configurar Zoom</h2>
    <p>Defina até onde a imagem pode se aproximar e até onde pode se afastar. Depois clique em Aplicar.</p>

    <div class="range-row">
      <label>Distância mínima (mais perto) <span id="min-val-label">0.5×</span></label>
      <input type="range" id="min-range" min="0.1" max="3" step="0.1" value="0.5">
    </div>

    <div class="range-row lock-range">
      <label>Distância máxima (mais longe) <span id="max-val-label">5×</span></label>
      <input type="range" id="max-range" min="1" max="20" step="0.5" value="5">
    </div>

    <div class="modal-actions">
      <button class="btn" id="apply-zoom-btn">✓ Aplicar</button>
      <button class="btn danger" id="cancel-zoom-btn">✕ Cancelar</button>
    </div>
  </div>
</div>

<!-- CROSSHAIR -->
<div id="crosshair"></div>

<!-- TOAST -->
<div id="toast" id="toast"></div>

<script>
// ── STATE ──
const state = {
  scale: 1,
  minScale: 0.5,
  maxScale: 5,
  posX: 0,
  posY: 0,
  isDragging: false,
  startX: 0, startY: 0,
  locked: false,
  unlockClicks: 0,
  unlockTimer: null
};

// ── ELEMENTS ──
const uploadScreen   = document.getElementById('upload-screen');
const viewerScreen   = document.getElementById('viewer-screen');
const fileInput      = document.getElementById('file-input');
const uploadBtn      = document.getElementById('upload-btn');
const dropZone       = document.getElementById('drop-zone');
const canvasWrap     = document.getElementById('canvas-wrap');
const imgEl          = document.getElementById('img-el');
const zoomLabel      = document.getElementById('zoom-label');
const minDisplay     = document.getElementById('min-display');
const maxDisplay     = document.getElementById('max-display');
const lockBtn        = document.getElementById('lock-btn');
const unlockBtn      = document.getElementById('unlock-btn');
const lockBadge      = document.getElementById('lock-badge');
const changeImgBtn   = document.getElementById('change-img-btn');
const openZoomModal  = document.getElementById('open-zoom-modal-btn');
const zoomModal      = document.getElementById('zoom-modal');
const minRange       = document.getElementById('min-range');
const maxRange       = document.getElementById('max-range');
const minValLabel    = document.getElementById('min-val-label');
const maxValLabel    = document.getElementById('max-val-label');
const applyZoomBtn   = document.getElementById('apply-zoom-btn');
const cancelZoomBtn  = document.getElementById('cancel-zoom-btn');
const crosshair      = document.getElementById('crosshair');
const toast          = document.getElementById('toast');

// ── TOAST ──
function showToast(msg, dur = 2200) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), dur);
}

// ── APPLY TRANSFORM ──
function applyTransform() {
  imgEl.style.transform =
    `translate(calc(-50% + ${state.posX}px), calc(-50% + ${state.posY}px)) scale(${state.scale})`;
  zoomLabel.textContent = state.scale.toFixed(1) + '×';
}

// ── UPLOAD ──
function loadImage(file) {
  if (!file || !file.type.startsWith('image/')) {
    showToast('Selecione um arquivo de imagem válido.');
    return;
  }
  const url = URL.createObjectURL(file);
  imgEl.src = url;
  imgEl.onload = () => {
    state.scale = 1;
    state.posX = 0;
    state.posY = 0;
    state.locked = false;
    unlockClicks = 0;
    applyTransform();
    updateLockUI(false);
    uploadScreen.style.display = 'none';
    viewerScreen.classList.add('active');
    updateDistDisplay();
  };
}

uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => loadImage(e.target.files[0]));
changeImgBtn.addEventListener('click', () => {
  state.locked = false;
  updateLockUI(false);
  uploadScreen.style.display = '';
  viewerScreen.classList.remove('active');
  fileInput.value = '';
});

// drag-and-drop
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = ''; });
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.style.borderColor = '';
  loadImage(e.dataTransfer.files[0]);
});

// ── DRAG TO PAN ──
canvasWrap.addEventListener('mousedown', e => {
  if (state.locked) return;
  state.isDragging = true;
  state.startX = e.clientX - state.posX;
  state.startY = e.clientY - state.posY;
  canvasWrap.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if (!state.isDragging) return;
  state.posX = e.clientX - state.startX;
  state.posY = e.clientY - state.startY;
  applyTransform();
});
window.addEventListener('mouseup', () => {
  state.isDragging = false;
  canvasWrap.classList.remove('grabbing');
});

// touch pan
let touchStart = null;
canvasWrap.addEventListener('touchstart', e => {
  if (state.locked || e.touches.length !== 1) return;
  touchStart = { x: e.touches[0].clientX - state.posX, y: e.touches[0].clientY - state.posY };
});
canvasWrap.addEventListener('touchmove', e => {
  if (!touchStart || e.touches.length !== 1) return;
  state.posX = e.touches[0].clientX - touchStart.x;
  state.posY = e.touches[0].clientY - touchStart.y;
  applyTransform();
});
canvasWrap.addEventListener('touchend', () => { touchStart = null; });

// ── SCROLL TO ZOOM ──
canvasWrap.addEventListener('wheel', e => {
  if (state.locked) return;
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.1 : 0.1;
  state.scale = Math.min(state.maxScale, Math.max(state.minScale, state.scale + delta));
  applyTransform();
}, { passive: false });

// ── ZOOM MODAL ──
function updateDistDisplay() {
  minDisplay.textContent = state.minScale.toFixed(1) + '×';
  maxDisplay.textContent = state.maxScale.toFixed(1) + '×';
}

minRange.addEventListener('input', () => {
  minValLabel.textContent = parseFloat(minRange.value).toFixed(1) + '×';
});
maxRange.addEventListener('input', () => {
  maxValLabel.textContent = parseFloat(maxRange.value).toFixed(1) + '×';
});

openZoomModal.addEventListener('click', () => {
  minRange.value = state.minScale;
  maxRange.value = state.maxScale;
  minValLabel.textContent = state.minScale.toFixed(1) + '×';
  maxValLabel.textContent = state.maxScale.toFixed(1) + '×';
  zoomModal.classList.add('open');
});

applyZoomBtn.addEventListener('click', () => {
  const minV = parseFloat(minRange.value);
  const maxV = parseFloat(maxRange.value);
  if (minV >= maxV) {
    showToast('Mínimo deve ser menor que o máximo.');
    return;
  }
  state.minScale = minV;
  state.maxScale = maxV;
  // clamp current
  state.scale = Math.min(state.maxScale, Math.max(state.minScale, state.scale));
  applyTransform();
  updateDistDisplay();
  zoomModal.classList.remove('open');
  showToast(`Zoom: ${minV.toFixed(1)}× — ${maxV.toFixed(1)}×`);
});

cancelZoomBtn.addEventListener('click', () => zoomModal.classList.remove('open'));
zoomModal.addEventListener('click', e => { if (e.target === zoomModal) zoomModal.classList.remove('open'); });

// ── LOCK / UNLOCK ──
function updateLockUI(locked) {
  state.locked = locked;
  if (locked) {
    lockBtn.style.display = 'none';
    unlockBtn.style.display = '';
    lockBadge.textContent = 'TRAVADO';
    lockBadge.classList.add('is-locked');
    canvasWrap.classList.add('locked-cursor');
    crosshair.classList.add('show');
  } else {
    lockBtn.style.display = '';
    unlockBtn.style.display = 'none';
    lockBadge.textContent = 'LIVRE';
    lockBadge.classList.remove('is-locked');
    canvasWrap.classList.remove('locked-cursor');
    crosshair.classList.remove('show');
    state.unlockClicks = 0;
  }
}

lockBtn.addEventListener('click', () => {
  updateLockUI(true);
  showToast('Imagem travada. Clique em Destravar 2× para liberar.', 3000);
});

unlockBtn.addEventListener('click', () => {
  state.unlockClicks++;
  if (state.unlockClicks >= 2) {
    updateLockUI(false);
    showToast('Imagem destravada!');
  } else {
    showToast(`Clique mais ${2 - state.unlockClicks}× para destravar.`);
    // reset after 3s
    clearTimeout(state.unlockTimer);
    state.unlockTimer = setTimeout(() => { state.unlockClicks = 0; }, 3000);
  }
});

// ── PINCH ZOOM ──
let lastPinchDist = null;
canvasWrap.addEventListener('touchstart', e => {
  if (e.touches.length === 2) lastPinchDist = null;
});
canvasWrap.addEventListener('touchmove', e => {
  if (state.locked || e.touches.length !== 2) return;
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (lastPinchDist !== null) {
    const ratio = dist / lastPinchDist;
    state.scale = Math.min(state.maxScale, Math.max(state.minScale, state.scale * ratio));
    applyTransform();
  }
  lastPinchDist = dist;
}, { passive: true });

// init display
updateDistDisplay();
</script>
</body>
</html>
